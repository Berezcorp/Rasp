<!DOCTYPE html>

  <style>
    html, body { height: 100%; }
    body { background: #0b1220; color: #e5e7eb; }
    .chip { padding:.15rem .5rem; border-radius:9999px; background:#0f172a; border:1px solid #1f2937; white-space:nowrap; font-size:.78rem; }
    .card { border-radius:1rem; background:linear-gradient(180deg,#0f172a 0%,#0c1222 100%); border:1px solid #1f2937; box-shadow:0 10px 24px rgba(0,0,0,.28); }
    .modal { position:fixed; inset:0; display:grid; place-items:center; background:rgba(0,0,0,.6); z-index:60; }
    .modal-opaque { position:fixed; inset:0; display:grid; place-items:center; background:#000; z-index:70; }
    .btn { border-radius:.85rem; padding:.5rem .8rem; border:1px solid #334155; background:#0b1220; font-size:.95rem; transition:transform .06s ease, box-shadow .2s ease, background .2s ease; }
    .btn:hover { background:#101a2f; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background:#0369a1; border-color:#0284c7; }
    .btn-primary:hover { background:#0284c7; }
    .btn-danger { background:#9f1239; border-color:#be123c; }
    .btn-danger:hover { background:#be123c; }
    .btn-success { background:#15803d; border-color:#16a34a; }
    .btn-success:hover { background:#16a34a; }
    .k { font-size:.9rem; opacity:.9; }

    .flash { box-shadow:0 0 0 3px rgba(56,189,248,.35); }
    .play-input { background:#0f172a; border:1px solid #1f2937; border-radius:.75rem; padding:.5rem .6rem; }

    @media (max-width: 420px) {
      .play-card .title { font-size:1.05rem; }
      .play-card .btn { padding:.45rem .7rem; font-size:.9rem; }
      .card { padding: .75rem !important; }
    }

    .dd-panel {
      position: absolute; z-index: 40; inset-inline-start: 0; top: 110%;
      width: min(92vw, 420px);
      background:#0b1220; border:1px solid #1f2937; border-radius: .75rem;
      box-shadow: 0 12px 28px rgba(0,0,0,.45);
      max-height: 55vh; overflow:auto; padding:.5rem;
    }

    .help {
      display:inline-flex; align-items:center; justify-content:center;
      width:1.05rem; height:1.05rem; border-radius:9999px;
      background:#1f2937; border:1px solid #334155; font-size:.75rem; margin-left:.35rem;
    }

    .timer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:grid; place-items:center; z-index:80; }
    .timer-circle { width:min(70vw,420px); height:min(70vw,420px); border-radius:9999px; border:10px solid rgba(148,163,184,.35); display:grid; place-items:center; }
    .timer-digits { font-size:min(16vw,96px); line-height:1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    const accumulatedMsRef = useRef(0);
    const lastResumeAtRef = useRef(Date.now());

    useEffect(() => {
      const id = setInterval(() => {
        const now = Date.now();
        const ms = paused ? accumulatedMsRef.current : (accumulatedMsRef.current + (now - lastResumeAtRef.current));
        const s  = Math.floor(ms/1000);
        const mm = String(Math.floor(s/60)).padStart(2,'0');
        const ss = String(s%60).padStart(2,'0');
        if (digitsRef.current) digitsRef.current.textContent = `⏱ ${mm}:${ss}`;
      }, 250);
      return () => clearInterval(id);
    }, [paused]);

    const doPause = () => {
      if (paused) return;
      accumulatedMsRef.current += Date.now() - lastResumeAtRef.current;
      setPaused(true);
      onPauseChange && onPauseChange(true, accumulatedMsRef.current);
    };
    const doResume = () => {
      if (!paused) return;
      lastResumeAtRef.current = Date.now();
      setPaused(false);
      onPauseChange && onPauseChange(false, accumulatedMsRef.current);
    };

    const toggle = () => paused ? doResume() : doPause();

    useImperativeHandle(ref, () => ({
      pause: doPause,
      resume: doResume,
      isPaused: () => paused,
      getElapsed: () => (paused
        ? accumulatedMsRef.current
        : (accumulatedMsRef.current + (Date.now() - lastResumeAtRef.current))),
      setElapsed: (ms) => {
        accumulatedMsRef.current = Math.max(0, Number(ms)||0);
        lastResumeAtRef.current = Date.now();
      }
    }), [paused]);

    return (
      <div
        className={className||"k"}
        style={{minWidth:80, textAlign:'right', cursor:'pointer'}}
        title={paused? 'Resume timer (click)' : 'Pause timer (click)'}
        onClick={toggle}
      >
        <span ref={digitsRef}>⏱ 00:00</span>
        {paused ? <span style={{marginLeft:6, opacity:0.8}}>{'⏸'}</span> : null}
      </div>
    );
  });

      const mastEnabled = includeMasturbate && !hasPanties(herInv) && !hasPanties(youInv);
      if (!mastEnabled) w.masturbate = 0;

      const total = Object.values(w).reduce((a,b)=>a+b,0);
      if (total <= 0) return { kiss:0, massage:0, strip:1, bite:0, masturbate:0 };
      const out = {};
      for (const k of Object.keys(w)) out[k] = w[k] / total;

    function averageBalanceMultiplier() {
      if (!advPending.balanceClothes) return 1.0;
      const herCnt = countByCategory(herInv).total;
      const youCnt = countByCategory(youInv).total;
      const diff = youCnt - herCnt;
      if (Math.abs(diff) > (advPending.balanceMaxDiff ?? 2)) {
        return 1.125;
      }
      return 1.0;
    }

    function estimateMovesForPace(paceKey) {
      const totalItems = countByCategory(herInv).total + countByCategory(youInv).total;
      if (totalItems <= 0) return 0;
      if (!includeStrip) return "—";

      const base = getNormalizedWeightsFromPending();

      const othersSumIfNoStrip = (base.kiss||0)+(base.massage||0)+(base.bite||0)+(base.masturbate||0);
      if (othersSumIfNoStrip === 0) {
        return totalItems;
      }

      const paceMap = { superfast: 2.25, fast: 1.5, normal: 1.0, slow: 0.7 };
      const paceMult = paceMap[paceKey] ?? 1.0;
      const balanceAvg = averageBalanceMultiplier();

      const w_strip_eff = (base.strip||0) * paceMult * balanceAvg;
      const w_others = othersSumIfNoStrip;

      const pStrip = w_strip_eff / (w_strip_eff + w_others);
      const pSafe = Math.max(0.0001, Math.min(0.9999, pStrip));

      const moves = totalItems / pSafe;

      return Math.round(moves);
    }

    const movesForecast = useMemo(()=>{
      return {
        superfast: estimateMovesForPace('superfast'),
        fast:      estimateMovesForPace('fast'),
        normal:    estimateMovesForPace('normal'),
        slow:      estimateMovesForPace('slow'),
      };
    }, [

                      className={`play-input ${questionLocked && submitState === "wrong" && selectedConj !== correctConj ? 'border-rose-500 bg-rose-900/30' : ''} ${isFullyLocked ? 'border-emerald-500 bg-emerald-900/30' : ''}`}
                      value={selectedConj}
                      disabled={isFullyLocked}
                      onFocus={()=>pauseAutosave(2000)}
                      onChange={(e)=>{
                        if (isFullyLocked) return;
                        const v = e.target.value;
                        setSelectedConj(v);
                        const ready = (v !== "inf" && selectedPrep !== null);
                        setSubmitState(ready ? "ready" : "idle");
                      }}
                    >
                      <option value="inf" disabled={questionLocked}>{firstVerb.key} (inf.)</option>
                      {conjShuffled.map(opt => (
                        <option 
                          key={opt} 
                          value={opt}
                          disabled={conjDisabledLogic(opt)}

                    <select

                      value={selectedPrep===null ? "__none__" : selectedPrep}

                        if (isFullyLocked) return;
                        const v = e.target.value;

                        const ready = (selectedConj !== "inf" && prep !== null);
                        setSubmitState(ready ? "ready" : "idle");
                      }}

                      <option value="" disabled={prepDisabledLogic("")}>[ ]{questionLocked && submitState === "wrong" && "" !== correctPrep ? ' ✗' : ''}</option>

                      <option value="a" disabled={prepDisabledLogic("a")}>a{questionLocked && submitState === "wrong" && "a" !== correctPrep ? ' ✗' : ''}</option>
                      <option value="em" disabled={prepDisabledLogic("em")}>em{questionLocked && submitState === "wrong" && "em" !== correctPrep ? ' ✗' : ''}</option>
                    </select>
                  </>
                );
              })()}

              <span className="px-2 py-1 rounded bg-slate-900/60 border border-slate-800">{secondVerb.pt}.</span>

            <div className="mt-2 text-xs opacity-80">
              First verb: <span className="text-slate-200">{firstVerb.en}</span> · <span className="text-slate-200">{firstVerb.tr}</span>
            </div>
            <div className="text-xs opacity-80">

            </div>

            <div className="mt-3 flex flex-wrap items-center gap-2">
              <button
                className={submitCls}
                disabled={submitState!=="ready"}

              >

              {!sexReadyToFinish ? (
                <button className={`btn ${canNext ? "btn-primary" : ""}`} disabled={!canNext} onClick={nextSentence}>

              ) : (
                <button className="btn btn-success" onClick={openCumModal}>

              {lastOutcomeDur && !timerOpen && !timerId.current && (
                <button className="btn" disabled={!timerReady} onClick={()=>startTimer(lastOutcomeDur)}>
                  Start timer ({String(Math.floor(lastOutcomeDur/60)).padStart(2,"0")}:{String(lastOutcomeDur%60).padStart(2,"0")})

              <button
                className="btn"

            {showAnswer && (

                <div className="text-xs opacity-80 mb-1">Portuguese sentence (presente):</div>

            {lastOutcome && (
              <div className="mt-3 p-2 rounded-xl bg-slate-900/60 border border-slate-800">
                <div className="text-xs opacity-80 mb-1">Outcome</div>
                <div className="text-base leading-snug break-words">{lastOutcome}</div>

          </div>

          {/* Round controls */}
          <div className="card p-3">
            <div className="text-sm font-semibold mb-2">Round controls (manual selection of current prompt)</div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
              <div>
                <label className="opacity-80">Person</label>
                <select className="mt-1 w-full px-2 py-2 rounded-xl bg-slate-800 border border-slate-700"

                    setPerson(e.target.value);

            </div>

                <div><div className="opacity-70">(no prep)</div><div className="flex flex-wrap gap-2 mt-1">{["querer","tentar","decidir","prometer","preferir","conseguir","saber","poder","ir","dever","esperar","evitar","planear","procurar","costumar","experimentar"].map(it=> <span key={it} className="chip">{it}</span>)}</div></div>

              <label className="flex items-center gap-2"><input type="checkbox" className="accent-sky-500" checked={includeKiss} onChange={e=>setIncludeKiss(e.target.checked)}/> Include Kiss</label>
              <label className="flex items-center gap-2"><input type="checkbox" className="accent-sky-500" checked={includeMassage} onChange={e=>setIncludeMassage(e.target.checked)}/> Include Massage</label>
              <label className="flex items-center gap-2"><input type="checkbox" className="accent-sky-500" checked={includeBite} onChange={e=>setIncludeBite(e.target.checked)}/> Include Bite</label>
              <label className="flex items-center gap-2"><input type="checkbox" className="accent-sky-500" checked={includeMasturbate} onChange={e=>setIncludeMasturbate(e.target.checked)}/> Include Masturbation</label>
            </div>

          <div className="card p-4">
            <h2 className="text-lg font-semibold">Mode</h2>

              <button className="btn btn-primary" onClick={setDefaultsNow}>Set Default (save current)</button>
              <button className="btn" onClick={applySavedDefaults}>Default (apply saved)</button>
              <button className="btn btn-danger" onClick={zeroAll}>Zero (all 0)</button>
            </div>
          </div>

          <AdvancedBlock/>

          <div className="flex gap-2">
            <button className="btn btn-primary" onClick={()=>setPage("game")}>Back to Game</button>
          </div>
        </div>
      );
    }

    function EndModal() {
      if (!showEndModal) return null;
      return (
        <div className="modal">
          <div className="max-w-xl w-[95vw] card p-4">
            <div className="whitespace-pre-line text-sm">{endMessage}</div>
            <div className="mt-3 flex gap-2 justify-end">
              <button className="btn" onClick={()=>proceedAfterEnd(false)}>{round===1 ? "No" : "End"}</button>

    function SexUnlockModal() {

    function TimerOverlay() {
      if (!timerOpen) return null;
      const mm = String(Math.floor(timerLeft/60)).padStart(2,"0");
      const ss = String(timerLeft%60).padStart(2,"0");
      return (
        <div className="timer-overlay" onClick={cancelTimerSilently}>
          <div className="timer-circle" onClick={(e)=>e.stopPropagation()}>
            <div className="timer-digits">{mm}:{ss}</div>
          </div>

    return (
      <div className="min-h-screen w-full p-3 md:p-8">
        <div className="max-w-5xl mx-auto grid gap-3">
          <header className="flex items-center justify-between">
            <h1 className="text-xl md:text-3xl font-bold tracking-tight">Portuguese Preposition Play — Couples Game</h1>

            <Stopwatch

              <button
                className={`btn ${page==="game" ? "btn-primary" : ""}`}

                Game

              <button
                className={`btn ${page==="settings" ? "btn-primary" : ""}`}
                onClick={()=>setPage("settings")}

          {page==="game" ? (currentQuestionMode==="prepositions" ? <GamePage/> : renderTrainingCard()) : <SettingsPage/>}

          <EndModal/>

            <p>Consent: play only if both of you are enthusiastically consenting adults. Adjust actions in Settings.</p>

        </div>
      </div>

  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
